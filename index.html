<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Speckle Interactive Urbanism - WebXR</title>

    <!-- OpenCV is still required for blob detection -->
    <script 
      src="https://docs.opencv.org/4.10.0/opencv.js"
      type="text/javascript"
    ></script>

    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <script type="module" src="./src/app.ts"></script>

    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: #222;
        font-family: sans-serif;
        color: white;
      }

      /* UI Overlay for WebXR - Positioned absolutely */
      #ui-overlay {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 100;
        background: rgba(0, 0, 0, 0.6);
        padding: 15px;
        border-radius: 12px;
        backdrop-filter: blur(5px);
        max-width: 280px;
        max-height: 80vh;
        overflow-y: auto;
      }

      button {
        background: #3a86ff;
        color: white;
        border: none;
        padding: 8px 12px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
        width: 100%;
        margin-top: 5px;
      }
      button:hover {
        background: #2667cc;
      }

      .settings-panel {
        margin-top: 15px;
        display: none; /* Toggled by JS */
        border-top: 1px solid rgba(255,255,255,0.2);
        padding-top: 10px;
      }

      .color-block {
         margin-top: 10px;
         background: rgba(255,255,255,0.05);
         padding: 8px;
         border-radius: 6px;
      }

      input[type=range] {
        width: 100%;
        display: block;
        margin: 5px 0;
      }

      input[type=color] {
        width: 100%;
        height: 30px;
        border: none;
        border-radius: 4px;
        padding: 0;
        cursor: pointer;
      }

      label {
        display: flex;
        justify-content: space-between;
        font-size: 0.9em;
        margin-bottom: 5px;
      }

      h4 { margin: 0 0 10px 0; }

      #qr-status {
        margin-top: 10px;
        font-style: italic;
        color: #ddd;
      }
    </style>
  </head>
  <body>
    <!-- The AR scene is handled by WebXR/Three.js creating a context on the canvas or implicitly -->

    <!-- UI Controls -->
    <div id="ui-overlay">
      <div id="qr-status">Initializing...</div>
      <button id="settings-btn">⚙ Settings</button>

      <div class="settings-panel" id="settingsPanel">
        <h4>Simulation Settings</h4>
        <div class="color-block">
            <label>Red Height <span id="labelRed">15</span></label>
            <input type="range" id="heightRed" min="3" max="60" value="15">
            <input type="color" id="colorRed" value="#ff0000">
        </div>
         <div class="color-block">
            <label>Blue Height <span id="labelBlue">33</span></label>
            <input type="range" id="heightBlue" min="3" max="60" value="33">
             <input type="color" id="colorBlue" value="#005aff">
        </div>
         <div class="color-block">
            <label>Green Height <span id="labelGreen">6</span></label>
            <input type="range" id="heightGreen" min="3" max="60" value="6">
             <input type="color" id="colorGreen" value="#1eff00">
        </div>
      </div>
    </div>

    <!-- Start Button is dynamically added by app.ts -->
  </body>
</html>
