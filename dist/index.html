<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Speckle Interactive Urbanism</title>
    
    <!-- 8th Wall Engine (Open Source SLAM binary) served from local public folder -->
    <script src="/8thwall/engine-binary/xr.js" async crossorigin="anonymous" data-preload-chunks="slam"></script>
    <script src="/8thwall/xrextras/xrextras.js" crossorigin="anonymous"></script>
    <script src="https://docs.opencv.org/4.10.0/opencv.js" type="text/javascript" async></script>
    
    <!-- Eruda Mobile Console -->
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>
      eruda.init({
        defaults: {
          displaySize: 40,
          transparency: 0.9,
          theme: 'Dark'
        }
      });
    </script>
    
    <script>
      (function() {
        const originalLog = console.log;
        const originalError = console.error;
        const originalWarn = console.warn;
        
        let logBuffer = [];
        let logTimeout = null;
        
        function sendLog(level, args) {
          const message = Array.from(args).map(arg => {
            if (arg instanceof Event) {
              return `Event: type=${arg.type}, target=${arg.target ? (arg.target.tagName || arg.target.nodeName) : 'unknown'}`;
            }
            return typeof arg === 'object' ? JSON.stringify(arg) : String(arg);
          }).join(' ');
          
          logBuffer.push(`[${level.toUpperCase()}] ${message}`);
          
          if (!logTimeout) {
            logTimeout = setTimeout(() => {
              const body = logBuffer.join('\n');
              logBuffer = [];
              logTimeout = null;
              if (!window.__isProd) {
                fetch('/log', {
                  method: 'POST',
                  body: body
                }).catch(() => {});
              }
            }, 500);
          }
        }

        console.log = function(...args) {
          originalLog.apply(console, args);
          sendLog('log', args);
        };
        console.error = function(...args) {
          originalError.apply(console, args);
          sendLog('error', args);
        };
        console.warn = function(...args) {
          originalWarn.apply(console, args);
          sendLog('warn', args);
        };

        window.addEventListener('error', function(e) {
          if (e.target && (e.target.src || e.target.href)) {
            sendLog('error', [`Resource failed to load: ${e.target.tagName} at ${e.target.src || e.target.href}`]);
          } else if (e.error) {
            sendLog('error', [e.error.message, e.error.stack]);
          } else {
            sendLog('error', [e.message || 'Unknown Error Event']);
          }
        }, true);

        window.addEventListener('unhandledrejection', function(e) {
          sendLog('error', [e.reason ? (e.reason.message || e.reason) : 'Unhandled Promise Rejection']);
        });
      })();
    </script>


    <style>
      * {
        box-sizing: border-box;
      }
      
      body {
        display: flex;
        height: 100vh;
        margin: 0;
        overflow-y: hidden;
        font-size: x-small;
        background-color: black;
      }
      
      /* The 8th Wall camera feed will render into a canvas, we want it full screen */
      #arCanvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
      }
      
      select,
      button {
        margin-top: 5px;
        display: block;
        width: 100%;
      }
      
      #qr-status {
        margin-top: 10px;
        font-size: x-small;
      }
      
      #overlay {
        position: absolute;
        bottom: 20px;
        left: 20px;
        width: 250px;
        padding: 10px;
        background: rgba(168, 168, 168, 0.7);
        color: white;
        border-radius: 10px;
        z-index: 10;
      }

      /* We will hide the original speckle container since we'll use Three.js natively in AR */
      #speckle-container {
        display: none; 
      }

      /* Settings panel */
      .settings-panel {
        position: absolute;
        top: 20px;
        left: 20px;
        width: 250px;
        background: rgba(168, 168, 168, 0.7);
        padding: 15px;
        border-radius: 10px;
        box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
        display: none;
        color: white;
        z-index: 10;
      }

      /* Color blocks */
      .color-block {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 10px;
      }

      .slider {
        width: 100%;
      }
    </style>
    <script type="module" crossorigin src="/assets/index-B-Vy5SrN.js"></script>
  </head>
  <body>
    <!-- Hidden speckle container for headless loading -->
    <div id="speckle-container"></div>
    <div id="speckle-model"></div>

    <canvas id="arCanvas"></canvas>
    
    <div id="overlay">
      <select id="cameraSelect"></select>
      <p id="qr-status">Initializing AR...</p>
      <button id="capture">Capture & Overlay</button>
      <button id="settings-btn">⚙ Settings</button>
    </div>
    
    <div class="settings-panel" id="settingsPanel">
      <h4>Settings</h4>
      
      <div style="margin-bottom: 15px; border-bottom: 1px solid #555; padding-bottom: 10px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
          <label for="globalScaleRange">Global Scale:</label>
          <input type="number" id="globalScaleInput" value="0.01" step="0.01" style="width: 60px;" />
        </div>
        <input
          type="range"
          id="globalScaleRange"
          class="slider"
          min="0"
          max="6"
          step="1"
          value="0"
        />
      </div>

      <div style="margin-bottom: 15px; border-bottom: 1px solid #555; padding-bottom: 10px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
          <label for="timeOfDayRange">Time of Day (Hour):</label>
          <span id="timeOfDayLabel">12:00</span>
        </div>
        <input
          type="range"
          id="timeOfDayRange"
          class="slider"
          min="0"
          max="24"
          step="0.5"
          value="12"
        />

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; margin-top: 10px;">
          <label for="monthOfYearRange">Month of Year:</label>
          <span id="monthOfYearLabel">March</span>
        </div>
        <input
          type="range"
          id="monthOfYearRange"
          class="slider"
          min="1"
          max="12"
          step="1"
          value="3"
        />
      </div>

      <div class="color-block">
        <input type="color" id="colorRed" />
        <label id="labelRed">Height: 150</label>
      </div>
      <input
        type="range"
        id="heightRed"
        class="slider"
        min="3"
        max="60"
        value="15"
      />

      <div class="color-block">
        <input type="color" id="colorBlue" />
        <label id="labelBlue">Height: 150</label>
      </div>
      <input
        type="range"
        id="heightBlue"
        class="slider"
        min="3"
        max="60"
        value="33"
      />

      <div class="color-block">
        <input type="color" id="colorGreen" />
        <label id="labelGreen">Height: 150</label>
      </div>
      <input
        type="range"
        id="heightGreen"
        class="slider"
        min="3"
        max="60"
        value="6"
      />

    </div>
  </body>
</html>
