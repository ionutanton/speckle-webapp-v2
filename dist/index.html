<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Speckle Interactive Urbanism</title>
    
    <!-- 8th Wall Engine (Open Source SLAM binary) served from local public folder -->
    <script src="/8thwall/engine-binary/xr.js" async crossorigin="anonymous" data-preload-chunks="slam"></script>
    <script src="/8thwall/xrextras/xrextras.js" crossorigin="anonymous"></script>
    <script src="https://docs.opencv.org/4.10.0/opencv.js" type="text/javascript"></script>
    
    <!-- Eruda Mobile Console -->
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>
      eruda.init({
        defaults: {
          displaySize: 40,
          transparency: 0.9,
          theme: 'Dark'
        }
      });
    </script>
    
    <!-- Forward console to PC server -->
    <script>
      (function() {
        const originalLog = console.log;
        const originalError = console.error;
        const originalWarn = console.warn;
        
        let logBuffer = [];
        let logTimeout = null;
        
        function sendLog(level, args) {
          const message = Array.from(args).map(arg => 
            typeof arg === 'object' ? JSON.stringify(arg) : String(arg)
          ).join(' ');
          
          logBuffer.push(`[${level.toUpperCase()}] ${message}`);
          
          if (!logTimeout) {
            logTimeout = setTimeout(() => {
              const body = logBuffer.join('\n');
              logBuffer = [];
              logTimeout = null;
              fetch('/log', {
                method: 'POST',
                body: body
              }).catch(() => {});
            }, 500);
          }
        }

        console.log = function(...args) {
          originalLog.apply(console, args);
          sendLog('log', args);
        };
        console.error = function(...args) {
          originalError.apply(console, args);
          sendLog('error', args);
        };
        console.warn = function(...args) {
          originalWarn.apply(console, args);
          sendLog('warn', args);
        };
      })();
    </script>


    <style>
      * {
        box-sizing: border-box;
      }
      
      body {
        display: flex;
        height: 100vh;
        margin: 0;
        overflow-y: hidden;
        font-size: x-small;
        background-color: black;
      }
      
      /* The 8th Wall camera feed will render into a canvas, we want it full screen */
      #arCanvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
      }
      
      select,
      button {
        margin-top: 5px;
        display: block;
        width: 100%;
      }
      
      #qr-status {
        margin-top: 10px;
        font-size: x-small;
      }
      
      #overlay {
        position: absolute;
        bottom: 20px;
        left: 20px;
        width: 250px;
        padding: 10px;
        background: rgba(168, 168, 168, 0.7);
        color: white;
        border-radius: 10px;
        z-index: 10;
      }

      /* We will hide the original speckle container since we'll use Three.js natively in AR */
      #speckle-container {
        display: none; 
      }

      /* Settings panel */
      .settings-panel {
        position: absolute;
        top: 20px;
        left: 20px;
        width: 250px;
        background: rgba(168, 168, 168, 0.7);
        padding: 15px;
        border-radius: 10px;
        box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
        display: none;
        color: white;
        z-index: 10;
      }

      /* Color blocks */
      .color-block {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 10px;
      }

      .slider {
        width: 100%;
      }
    </style>
    <script type="module" crossorigin src="/assets/index-tLFajiOn.js"></script>
  </head>
  <body>
    <!-- Hidden speckle container for headless loading -->
    <div id="speckle-container"></div>
    <div id="speckle-model"></div>

    <canvas id="arCanvas"></canvas>
    
    <div id="overlay">
      <select id="cameraSelect"></select>
      <p id="qr-status">Initializing AR...</p>
      <button id="capture">Capture & Overlay</button>
      <button id="settings-btn">⚙ Settings</button>
    </div>
    
    <div class="settings-panel" id="settingsPanel">
      <h4>Settings</h4>
      <div class="color-block">
        <input type="color" id="colorRed" />
        <label id="labelRed">Height: 150</label>
      </div>
      <input
        type="range"
        id="heightRed"
        class="slider"
        min="3"
        max="60"
        value="15"
      />

      <div class="color-block">
        <input type="color" id="colorBlue" />
        <label id="labelBlue">Height: 150</label>
      </div>
      <input
        type="range"
        id="heightBlue"
        class="slider"
        min="3"
        max="60"
        value="33"
      />

      <div class="color-block">
        <input type="color" id="colorGreen" />
        <label id="labelGreen">Height: 150</label>
      </div>
      <input
        type="range"
        id="heightGreen"
        class="slider"
        min="3"
        max="60"
        value="6"
      />

    </div>
  </body>
</html>
