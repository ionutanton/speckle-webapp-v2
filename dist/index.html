<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Speckle Interactive Urbanism</title>
    <script src="https://unpkg.com/jsqr"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.5.1/math.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/numeric/1.2.6/numeric.min.js"></script>
    <script 
      src="https://docs.opencv.org/4.10.0/opencv.js"
      type="text/javascript"
    ></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: black;
        font-family: sans-serif;
        font-size: small;
      }
      /* Video element: hidden but used for processing */
      video {
        display: none;
      }
      /* Background Canvas: renders video feed */
      #qrCanvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 1;
        object-fit: cover;
      }
      /* Speckle Viewer: overlays 3D content */
      #speckle-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 2;
        pointer-events: none; /* Allow interaction if needed, but for now transparent */
      }
      #speckle-model {
        width: 100%;
        height: 100%;
        background: transparent;
      }
      /* UI Overlay */
      #ui-overlay {
        position: fixed;
        top: 10px;
        left: 10px;
        z-index: 10;
        background: rgba(0, 0, 0, 0.5);
        padding: 10px;
        border-radius: 8px;
        color: white;
        max-width: 250px;
      }
      select, button {
        margin-top: 5px;
        width: 100%;
        padding: 5px;
      }
      .settings-panel {
        margin-top: 10px;
        display: none;
        border-top: 1px solid #555;
        padding-top: 5px;
      }
      .color-block {
         margin-top: 10px;
         background: rgba(255,255,255,0.1);
         padding: 5px;
         border-radius: 4px;
      }
      input[type=range] {
        width: 100%;
        display: block;
      }
      input[type=color] {
        width: 100%;
        height: 30px;
        border: none;
        padding: 0;
      }
      label {
        display: flex;
        justify-content: space-between;
        margin-bottom: 2px;
      }
    </style>
    <script type="module" crossorigin src="/assets/index-CKd4zKGv.js"></script>
  </head>
  <body>
    <!-- 1. Video Input (Hidden) -->
    <video id="webcam" autoplay playsinline></video>

    <!-- 2. Background Canvas (Video Feed + Debug) -->
    <canvas id="qrCanvas"></canvas>

    <!-- 3. Speckle Viewer (3D Overlay) -->
    <div id="speckle-container">
      <div id="speckle-model"></div>
    </div>

    <!-- 4. UI Controls -->
    <div id="ui-overlay">
      <div id="qr-status">Detecting...</div>
      <select id="cameraSelect"></select>
      <button id="capture">Capture & Overlay</button>
      <button id="settings-btn">⚙ Settings</button>

      <div class="settings-panel" id="settingsPanel">
        <h4>Settings</h4>
        <div class="color-block">
            <label>Red Height <span id="labelRed">15</span></label>
            <input type="range" id="heightRed" min="3" max="60" value="15">
            <input type="color" id="colorRed" value="#ff0000">
        </div>
         <div class="color-block">
            <label>Blue Height <span id="labelBlue">33</span></label>
            <input type="range" id="heightBlue" min="3" max="60" value="33">
             <input type="color" id="colorBlue" value="#005aff">
        </div>
         <div class="color-block">
            <label>Green Height <span id="labelGreen">6</span></label>
            <input type="range" id="heightGreen" min="3" max="60" value="6">
             <input type="color" id="colorGreen" value="#1eff00">
        </div>
         <button id="get-camera-btn">Log Camera</button>
      </div>
    </div>
  </body>
</html>
